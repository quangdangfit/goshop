services:
  goshop:
    build: .
    ports:
      - "8888:8888"
    environment:
      port: 8888
      auth_secret: ${AUTH_SECRET:-auth_secret}
      database_uri: postgres://postgres:${POSTGRES_PASSWORD:-1234}@postgres:5432/postgres
      redis_uri: redis:6379
      redis_db: 0
    depends_on:
      - postgres
      - redis

  redis:
    image: "redis:alpine"

  postgres:
    restart: always
    image: "postgres:16-alpine"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-1234}
